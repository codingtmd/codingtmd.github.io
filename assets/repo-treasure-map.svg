<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Treasure map background">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6ebd1"/>
      <stop offset="100%" stop-color="#e2c89d"/>
    </linearGradient>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
    <style>
      .coast { fill: #f6ecd4; stroke: #c38e58; stroke-width: 5; stroke-linejoin: round; }
      .inner { fill: none; stroke: #e3c098; stroke-width: 2; stroke-linejoin: round; }
      .route { fill: none; stroke: #3c2b1c; stroke-width: 4; stroke-dasharray: 14 12; stroke-linecap: round; }
      .label { fill: #2f2419; font-family: Georgia, serif; font-size: 28px; letter-spacing: 1px; }
      .small { font-size: 22px; }
      .wave { fill: none; stroke: #9dd4db; stroke-width: 4; opacity: 0.75; }
      .peak { fill: none; stroke: #b78b58; stroke-width: 4; }
      .compass { fill: none; stroke: #3e2d1d; stroke-width: 5; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)"/>
